<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Details</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">

    <style>
        .detail-container {
            max-width: 800px;
            margin: 6rem auto 2rem;
            padding: 2rem;
            background-color: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeInUp 1s ease-out;
        }

        .detail-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .detail-icon {
            font-size: 5rem;
            display: block;
            margin-bottom: 1rem;
            animation: float 6s ease-in-out infinite;
        }

        .detail-title {
            font-family: var(--font-heading);
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .detail-meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .detail-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-primary);
        }
    </style>
</head>

<body>

    <div class="background-overlay"></div>

    <nav>
        <div class="logo">Mysteries Unveiled</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main id="mystery-content">
        <div class="detail-container" style="text-align: center;">
            <p>Loading mystery...</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 World's Greatest Unsolved Mysteries. Keep wondering.</p>
    </footer>

    <script src="mystery.js"></script>

</body>

</html>
